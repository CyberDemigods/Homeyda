<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="80%">
      <stop offset="0" stop-color="#F2EBE0"/>
      <stop offset="1" stop-color="#FBF7F2"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Donut motif left -->
  <g transform="translate(180 315)">
    <circle r="64" fill="none" stroke="#E8A5A5" stroke-width="22"/>
    <circle cx="-20" cy="-20" r="4" fill="#1A1614"/>
    <circle cx="20" cy="-25" r="3" fill="#1A1614"/>
    <circle cx="0" cy="20" r="3.5" fill="#1A1614"/>
    <circle cx="25" cy="15" r="3" fill="#1A1614"/>
    <circle cx="-25" cy="15" r="3" fill="#1A1614"/>
  </g>

  <!-- Donut motif right -->
  <g transform="translate(1020 315)">
    <circle r="64" fill="none" stroke="#E8A5A5" stroke-width="22"/>
    <circle cx="-22" cy="-18" r="3" fill="#1A1614"/>
    <circle cx="18" cy="-22" r="3.5" fill="#1A1614"/>
    <circle cx="5" cy="22" r="3" fill="#1A1614"/>
    <circle cx="-15" cy="15" r="3.5" fill="#1A1614"/>
    <circle cx="22" cy="10" r="3" fill="#1A1614"/>
  </g>

  <!-- Eyebrow -->
  <text x="600" y="200" text-anchor="middle" font-family="Marcellus, Georgia, serif" font-size="22" letter-spacing="8" fill="#C97D7D">— ARTISAN PATISSERIE · SHIRAZ —</text>

  <!-- Persian -->
  <text x="600" y="350" text-anchor="middle" font-family="Vazirmatn, Arial, sans-serif" font-weight="800" font-size="150" fill="#1A1614">هومیدا</text>

  <!-- Divider -->
  <g transform="translate(600 395)">
    <line x1="-110" y1="0" x2="-8" y2="0" stroke="#E8A5A5" stroke-width="1.5"/>
    <circle r="4" fill="#E8A5A5"/>
    <line x1="8" y1="0" x2="110" y2="0" stroke="#E8A5A5" stroke-width="1.5"/>
  </g>

  <!-- English -->
  <text x="600" y="470" text-anchor="middle" font-family="Marcellus, Georgia, serif" font-size="44" letter-spacing="10" fill="#1A1614">THE ART OF SWEETNESS</text>

  <!-- Sub -->
  <text x="600" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" letter-spacing="6" fill="#7A736A">BENTO  ·  BIRTHDAY  ·  CUSTOM</text>
</svg>
